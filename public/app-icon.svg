<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- background -->
  <rect width="1024" height="1024" fill="#0A0B0D"/>
  <!-- faint scanlines -->
  <g opacity="0.06" fill="#4ADE80">
    <rect width="1024" height="1024" fill="url(#s)"/>
  </g>
  <pattern id="s" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="1" fill="#4ADE80"/>
  </pattern>
  <!-- subtle inner frame -->
  <rect x="118" y="118" width="788" height="788" rx="40" fill="none" stroke="#4ADE80" stroke-opacity="0.18" stroke-width="6"/>
  <!-- terminal prompt  >_  -->
  <g filter="url(#glow)" stroke="#4ADE80" fill="#4ADE80" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="372,376 556,512 372,648" fill="none" stroke-width="74"/>
    <rect x="588" y="612" width="190" height="62" rx="20"/>
  </g>
</svg>
